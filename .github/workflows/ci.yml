name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nebula
          POSTGRES_PASSWORD: nebula
          POSTGRES_DB: nebula
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nebula"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nebula:nebula@localhost:5432/nebula?schema=public
      JWT_SECRET: test-test-test-test-test-test-test-test
      JWT_REFRESH_SECRET: refresh-refresh-refresh-refresh-refresh-refresh
      WEB_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nebula/shared build
      - run: cd packages/api && pnpm exec prisma migrate deploy && pnpm exec prisma generate
      - run: pnpm exec tsc --noEmit -p packages/api/tsconfig.json
      - run: pnpm run test
      - run: pnpm --filter @nebula/web build
